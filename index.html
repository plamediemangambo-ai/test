<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Site</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9f9f9;
      --nav-bg: #1a1a2e;
      --nav-text: #e0e0e0;
      --nav-hover: #ffffff;
      --accent: #e94560;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: #333;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .nav-logo {
      color: var(--nav-hover);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--nav-text);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--nav-hover);
    }

    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      font-weight: 600;
      transition: opacity 0.2s !important;
    }

    .nav-cta:hover {
      opacity: 0.85;
    }

    /* ── CORPS ── */
    main {
      /* Corps vide — ajoutez votre contenu ici */
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="#" class="nav-logo">Mon<span>Site</span></a>
    <ul class="nav-links">
      <li><a href="#">Accueil</a></li>
      <li><a href="#">À propos</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#" class="nav-cta">Démarrer</a></li>
    </ul>
  </nav>

  <!-- CORPS (vide) -->
  <main>
    <!-- Votre contenu ici -->
  </main>

</body>
</html>
